<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 128" role="img" aria-label="NERIUM">
  <title>NERIUM</title>
  <desc>NERIUM wordmark with bloom-glyph mark. Infrastructure for the AI agent economy. Palette swappable via CSS custom properties --color-primary, --color-accent, --color-foreground. Default fallbacks match cyberpunk_shanghai brand anchor (cyan #00f0ff, magenta #ff2e88, purple #8b5cf6) per NarasiGhaisan Section 23 brand voice. Nerium is a flowering plant, beautiful but toxic, fitting the dual-natured name thesis. Author: Hesperus W3.</desc>
  <defs>
    <linearGradient id="logoMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="var(--color-primary, #00f0ff)"/>
      <stop offset="1" stop-color="var(--color-accent, #8b5cf6)"/>
    </linearGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#logoGlow)">
    <g transform="translate(64, 64)" fill="none" stroke="url(#logoMark)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 0 -32 C 14 -28 22 -14 22 0 C 22 14 14 28 0 32 C -14 28 -22 14 -22 0 C -22 -14 -14 -28 0 -32 Z"/>
      <path d="M 0 -32 Q 0 0 0 32" stroke-opacity="0.55"/>
      <path d="M -22 0 Q 0 0 22 0" stroke-opacity="0.55"/>
    </g>
    <g transform="translate(64, 64)" fill="var(--color-secondary, #ff2e88)">
      <circle cx="0" cy="0" r="3.5"/>
    </g>
  </g>
  <g fill="var(--color-foreground, #e8eaef)" font-family="'Orbitron', 'Exo 2', 'Rajdhani', system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="6">
    <text x="128" y="80">NERIUM</text>
  </g>
  <g fill="var(--color-primary, #00f0ff)" opacity="0.78">
    <rect x="128" y="92" width="12" height="2"/>
    <rect x="146" y="92" width="54" height="2"/>
    <rect x="206" y="92" width="8" height="2"/>
  </g>
  <g fill="var(--color-accent, #8b5cf6)" font-family="monospace" font-size="9" font-weight="600" letter-spacing="2.5" opacity="0.82">
    <text x="128" y="110">INFRASTRUCTURE FOR THE AI AGENT ECONOMY</text>
  </g>
</svg>
