<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" role="img" aria-label="Steampunk Victorian HUD border">
  <title>Steampunk Victorian HUD Border</title>
  <desc>Polished brass-rivet frame with oxblood trim, walnut engraving, and aged ivory panel. Palette sourced from app/builder/worlds/steampunk_victorian/palette.ts. OKLCH: primary 0.680 0.110 78 (brass), secondary 0.380 0.130 25 (oxblood), accent 0.580 0.120 48 (walnut-brass), background 0.900 0.030 85 (aged ivory), foreground 0.280 0.040 55 (walnut), border 0.520 0.060 50. BioShock Columbia reference (NarasiGhaisan Section 7 V2 proposal). Author: Hesperus W3.</desc>
  <defs>
    <linearGradient id="spBrass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8c888"/>
      <stop offset="0.45" stop-color="#c9a061"/>
      <stop offset="1" stop-color="#6b4a22"/>
    </linearGradient>
    <linearGradient id="spBrassInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8b373"/>
      <stop offset="1" stop-color="#a47a3b"/>
    </linearGradient>
    <radialGradient id="spRivet" cx="0.3" cy="0.3" r="0.75">
      <stop offset="0" stop-color="#f0d89a"/>
      <stop offset="0.5" stop-color="#c9a061"/>
      <stop offset="1" stop-color="#5a3a1a"/>
    </radialGradient>
    <linearGradient id="spIvory" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0e4c8"/>
      <stop offset="1" stop-color="#e5d6b8"/>
    </linearGradient>
    <pattern id="spPaperTexture" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#e5d6b8"/>
      <circle cx="1" cy="2" r="0.25" fill="#a48556" fill-opacity="0.18"/>
      <circle cx="3" cy="3" r="0.2" fill="#a48556" fill-opacity="0.14"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="320" height="240" fill="url(#spBrass)"/>
  <rect x="10" y="10" width="300" height="220" fill="url(#spBrassInner)" stroke="#40281c" stroke-width="1.5"/>
  <rect x="20" y="20" width="280" height="200" fill="url(#spPaperTexture)" stroke="#7a2f24" stroke-width="1.25"/>
  <rect x="26" y="26" width="268" height="188" fill="none" stroke="#a46b3f" stroke-width="1" stroke-dasharray="8 2 2 2"/>
  <g stroke="#40281c" stroke-width="1">
    <circle cx="12" cy="12" r="5" fill="url(#spRivet)"/>
    <circle cx="308" cy="12" r="5" fill="url(#spRivet)"/>
    <circle cx="12" cy="228" r="5" fill="url(#spRivet)"/>
    <circle cx="308" cy="228" r="5" fill="url(#spRivet)"/>
    <circle cx="34" cy="12" r="3.5" fill="url(#spRivet)"/>
    <circle cx="286" cy="12" r="3.5" fill="url(#spRivet)"/>
    <circle cx="34" cy="228" r="3.5" fill="url(#spRivet)"/>
    <circle cx="286" cy="228" r="3.5" fill="url(#spRivet)"/>
    <circle cx="12" cy="34" r="3.5" fill="url(#spRivet)"/>
    <circle cx="308" cy="34" r="3.5" fill="url(#spRivet)"/>
    <circle cx="12" cy="206" r="3.5" fill="url(#spRivet)"/>
    <circle cx="308" cy="206" r="3.5" fill="url(#spRivet)"/>
  </g>
  <g fill="#40281c">
    <circle cx="12" cy="12" r="1.5"/>
    <circle cx="308" cy="12" r="1.5"/>
    <circle cx="12" cy="228" r="1.5"/>
    <circle cx="308" cy="228" r="1.5"/>
  </g>
  <g fill="none" stroke="#7a2f24" stroke-width="0.75">
    <path d="M160 14 Q168 18 160 22 Q152 18 160 14 Z"/>
    <path d="M160 218 Q168 222 160 226 Q152 222 160 218 Z"/>
    <path d="M10 120 Q14 128 18 120 Q14 112 10 120 Z"/>
    <path d="M302 120 Q306 128 310 120 Q306 112 302 120 Z"/>
  </g>
  <g stroke="#a46b3f" stroke-width="0.5" fill="none" opacity="0.7">
    <path d="M22 22 Q28 16 34 22 M286 22 Q292 16 298 22 M22 218 Q28 224 34 218 M286 218 Q292 224 298 218"/>
  </g>
  <g stroke="#40281c" stroke-width="0.35" fill="none" opacity="0.4">
