<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" role="img" aria-label="Cyberpunk Shanghai HUD border">
  <title>Cyberpunk Shanghai HUD Border</title>
  <desc>Neon cyan chassis with magenta corner glyphs, deep-purple inner plate, and void backing. Palette sourced from app/builder/worlds/cyberpunk_shanghai/palette.ts. OKLCH: primary 0.830 0.150 200 (cyan), secondary 0.660 0.270 5 (magenta), accent 0.620 0.220 295 (purple), background 0.100 0.020 270 (void), foreground 0.940 0.020 265. NarasiGhaisan Section 7 hex anchors: cyan #00f0ff, magenta #ff2e88, purple #8b5cf6, void #06060c. Blade Runner 2049 plus Ghost in the Shell reference. Author: Hesperus W3.</desc>
  <defs>
    <linearGradient id="cpVoid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0618"/>
      <stop offset="1" stop-color="#06060c"/>
    </linearGradient>
    <linearGradient id="cpPlate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0e3a"/>
      <stop offset="0.5" stop-color="#120a28"/>
      <stop offset="1" stop-color="#0a0618"/>
    </linearGradient>
    <linearGradient id="cpCyanEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#00f0ff" stop-opacity="1"/>
      <stop offset="1" stop-color="#00f0ff" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="cpGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="320" height="240" fill="url(#cpVoid)"/>
  <rect x="6" y="6" width="308" height="228" fill="url(#cpPlate)" stroke="#00f0ff" stroke-width="1.5"/>
  <rect x="14" y="14" width="292" height="212" fill="none" stroke="#8b5cf6" stroke-width="0.75"/>
  <rect x="22" y="22" width="276" height="196" fill="none" stroke="#ff2e88" stroke-width="0.5" stroke-opacity="0.55"/>
  <g filter="url(#cpGlow)" fill="none" stroke-width="2">
    <polyline points="6,36 6,6 36,6" stroke="#00f0ff"/>
    <polyline points="284,6 314,6 314,36" stroke="#00f0ff"/>
    <polyline points="6,204 6,234 36,234" stroke="#00f0ff"/>
    <polyline points="284,234 314,234 314,204" stroke="#00f0ff"/>
  </g>
  <g filter="url(#cpGlow)">
    <path d="M10 10 L26 10 L26 14 L14 14 L14 26 L10 26 Z" fill="#ff2e88"/>
    <path d="M310 10 L294 10 L294 14 L306 14 L306 26 L310 26 Z" fill="#ff2e88"/>
    <path d="M10 230 L26 230 L26 226 L14 226 L14 214 L10 214 Z" fill="#ff2e88"/>
    <path d="M310 230 L294 230 L294 226 L306 226 L306 214 L310 214 Z" fill="#ff2e88"/>
  </g>
  <g fill="#00f0ff" filter="url(#cpGlow)">
    <rect x="152" y="4" width="16" height="3"/>
    <rect x="152" y="233" width="16" height="3"/>
    <rect x="4" y="112" width="3" height="16"/>
    <rect x="313" y="112" width="3" height="16"/>
  </g>
  <g fill="#ff2e88" font-family="monospace" font-size="6" font-weight="700" letter-spacing="0.8">
    <text x="40" y="18" fill="#00f0ff" opacity="0.75">NRM.HUD.0x7A</text>
    <text x="260" y="232" text-anchor="end" opacity="0.65">RV.W3</text>
  </g>
  <g stroke="#8b5cf6" stroke-width="0.4" fill="none" opacity="0.5">
    <line x1="22" y1="60" x2="298" y2="60" stroke-dasharray="1 3"/>
    <line x1="22" y1="180" x2="298" y2="180" stroke-dasharray="1 3"/>
  </g>
  <g fill="#00f0ff">
    <circle cx="160" cy="60" r="1.2"/>
    <circle cx="160" cy="180" r="1.2"/>
  </g>
</svg>
