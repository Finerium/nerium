# Alembic configuration for NERIUM backend.
#
# Usage:
#   alembic -c src/backend/db/migrations/alembic.ini upgrade head
#
# The script_location is relative to the directory containing this file.
# env.py reads DATABASE_MIGRATION_URL from Settings so that migrations run as
# the nerium_migration role with BYPASSRLS (see postgres_multi_tenant.contract.md
# Section 4.3). DO NOT hardcode a URL in this file.

[alembic]
# ``%(here)s`` expands to the directory containing this alembic.ini so the
# migration scripts are located even when alembic is invoked from the repo
# root. Without this, ``script_location = .`` resolves against the current
# working directory and the versions folder silently disappears.
script_location = %(here)s
prepend_sys_path = %(here)s/../../../..
version_path_separator = os
sqlalchemy.url = driver://user:pass@host/dbname

# Revision filename template: NNN_snake_case_description.py
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 48

# timezone iso for revision timestamps in the header comment
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
