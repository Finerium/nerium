# GlitchTip self-hosted error tracking (Sentry-compatible wire protocol).
#
# Owner: Selene (W1 observability). Contract:
# docs/contracts/observability.contract.md Section 4.3.
#
# Runs on the same Hetzner CX32 as the NERIUM backend. Budget: ~2 GB RAM total
# across the four services below (Django web + Celery worker + Postgres 16 +
# Redis 7). If RAM pressure breaks the CX32 8 GB budget the fallback is to
# stop this compose file and point GLITCHTIP_DSN at Sentry Cloud Developer
# free tier (5k events/mo, 30-day retention).
#
# Bring up with:
#
#   docker compose -f ops/glitchtip/docker-compose.glitchtip.yml up -d
#
# First boot: visit http://localhost:8000, create organisation, create project,
# copy DSN into .env as GLITCHTIP_DSN.
#
# Healthcheck surface: /api/health returns 200 when DB + Redis reachable.

services:
  glitchtip-postgres:
    image: postgres:16-alpine
    container_name: glitchtip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_POSTGRES_PASSWORD:?set_in_dot_env}
    volumes:
      - glitchtip-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -d glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    networks:
      - glitchtip

  glitchtip-redis:
    image: redis:7-alpine
    container_name: glitchtip-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 192m
    networks:
      - glitchtip

  glitchtip-web:
    image: glitchtip/glitchtip:v4.2
    container_name: glitchtip-web
    restart: unless-stopped
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_POSTGRES_PASSWORD}@glitchtip-postgres:5432/glitchtip
      REDIS_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?set_in_dot_env}
      PORT: "8000"
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8000}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-noreply@nerium.local}
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 768m
    networks:
      - glitchtip

  glitchtip-worker:
    image: glitchtip/glitchtip:v4.2
    container_name: glitchtip-worker
    restart: unless-stopped
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    command: ["./bin/run-celery-with-beat.sh"]
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_POSTGRES_PASSWORD}@glitchtip-postgres:5432/glitchtip
      REDIS_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8000}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-noreply@nerium.local}
      CELERY_WORKER_AUTOSCALE: "1,3"
    mem_limit: 512m
    networks:
      - glitchtip

volumes:
  glitchtip-postgres-data:
    name: glitchtip-postgres-data

networks:
  glitchtip:
    name: glitchtip
    driver: bridge
